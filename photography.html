<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Abdullah Chabaytah</title>
  <meta name="description" content="Photography by Abdullah Chabaytah." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body data-page="photography">

  <div id="progress"></div>

  <nav>
    <a class="nav-logo" href="/">abdullah chabaytah</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="/projects.html">Projects</a></li>
        <li><a href="/photography.html" class="active">Photography</a></li>
        <li><a href="#" id="resumeLink" target="_blank">Resume</a></li>
      </ul>
      <button class="nav-btn nav-kbd" id="paletteTrigger" aria-label="Command palette" title="Command palette">⌘K</button>
      <button class="nav-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"></button>
    </div>
  </nav>

  <div class="container container--wide">
    <div class="page-header">
      <h1 class="page-title">Photography</h1>
      <p class="page-subtitle">A few moments I thought were worth keeping. Click any photo to view it full-size.</p>
    </div>

    <div class="gallery reveal" id="gallery"></div>
  </div>

  <div class="container">
    <footer>
      <div class="footer-inner">
        <p class="footer-copy">&copy; 2026 Abdullah Chabaytah</p>
        <p class="footer-time" id="localTime"></p>
        <div class="footer-links">
          <a href="https://github.com/maniic" target="_blank" rel="noopener">GitHub</a>
          <a href="https://linkedin.com/in/achabaytah" target="_blank" rel="noopener">LinkedIn</a>
          <a href="mailto:a.chabaytah@mail.utoronto.ca">Email</a>
        </div>
      </div>
    </footer>
  </div>

  <div class="lightbox" id="lightbox">
    <img src="" alt="" />
    <p class="lightbox-caption"></p>
    <button class="lightbox-btn lightbox-prev" aria-label="Previous photo">&larr;</button>
    <button class="lightbox-btn lightbox-next" aria-label="Next photo">&rarr;</button>
    <button class="lightbox-btn lightbox-close" aria-label="Close">&times;</button>
  </div>

  <div class="palette" id="palette">
    <div class="palette-box">
      <input class="palette-input" type="text" placeholder="Type a command or search…" spellcheck="false" />
      <ul class="palette-list"></ul>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script data-goatcounter="https://maniic.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
